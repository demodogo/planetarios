name: Staging Pre-Merge Backup

on:
  pull_request:
    types: [closed]
    branches:
      - staging

jobs:
  backup-before-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository at pre-merge staging SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backup tag for staging before merge
        id: create_tag
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG_NAME="backups/staging-pre-merge-${TIMESTAMP}-pr${{ github.event.pull_request.number }}"

          git tag -a "${TAG_NAME}" -m "Backup of staging before merging PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          git push origin "${TAG_NAME}"

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "base_sha=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          echo "tag_url=https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.create_tag.outputs.tag_name }}
          TAG_URL: ${{ steps.create_tag.outputs.tag_url }}
          BASE_SHA: ${{ steps.create_tag.outputs.base_sha }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Backup de staging antes del merge creado**
              
              - 📌 Tag: [\`${process.env.TAG_NAME}\`](${process.env.TAG_URL})
              - 📝 Estado guardado: commit de \`staging\` antes del merge
              - 🔗 Commit original: \`${process.env.BASE_SHA}\`
              - 🔄 Comparar cambios: \`git diff ${process.env.TAG_NAME}..staging\`
              - ♻️ Restaurar staging a ese punto:
                \`git checkout staging\`
                \`git reset --hard ${process.env.TAG_NAME}\`
                \`git push --force-with-lease origin staging\``
            })
